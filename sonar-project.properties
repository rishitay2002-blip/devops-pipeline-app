# SonarQube Project Configuration
sonar.projectKey=devops-pipeline-app
sonar.projectName=DevOps Pipeline App
sonar.projectVersion=1.0.0

# Source directories
sonar.sources=src
sonar.tests=tests

# Language
sonar.language=js
sonar.sourceEncoding=UTF-8

# Test coverage report (generated by Jest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Exclusions
sonar.exclusions=node_modules/**,dist/**,coverage/**

# Quality gate
sonar.qualitygate.wait=true
